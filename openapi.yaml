            operationId: Profile_GetList
            parameters:
                - name: pageSize
                  in: query
                  schema:
                    type: string
                - name: pageNum
                  in: query
                  schema:
                    type: string
                - name: scope
                  in: query
                  description: 'scope: org=当前组织成员；site=全站（仅站点管理员）；空=兼容旧逻辑（站管全站/否则组织）'
                  schema:
                    type: string
                - name: keyword
                  in: query
                  description: 模糊搜索：用户名 / 昵称（公共域 org_display_name ≡ users.name）；org 范围另含当前组织内名称
                  schema:
                    type: string
                - name: dormantOnly
                  in: query
                  description: true=仅不活跃（已暂停同步）用户；与 dormant 判定一致（站点阈值 + 豁免）
                  schema:
                    type: boolean
                - name: inactiveDays
                  in: query
                  description: |-
                    >0 时按「最近 N 天未登录」筛选（夹取 1–365）；与 dormantOnly 互斥时以本字段为准
