# GoAlgo production nginx — algo.zhiyuansofts.cn
# 备份原配置：scripts/nginx-backup/algo.zhiyuansofts.cn.conf.bak-20260718
#
# SEO：仅「纯爬虫 / 分享抓取器」走 SEO HTML；真人（含微信内打开）走 SPA
# 微信分享卡片：微信抓取器 UA 仍含 MicroMessenger，但无 Mobile Safari 等真人特征时走 SEO
# 若分享预览失败，可把 MicroMessenger 加回 bot 列表（真人会看到正式加载壳，不再是纯文本）

# map 必须放在 http {} 内（宝塔：nginx.conf 的 http 块，不要放进站点 server）
map $http_user_agent $is_seo_bot {
    default 0;
    # 纯搜索 / 社交预览机器人（不含普通浏览器、不含微信内置浏览器真人）
    ~*(facebookexternalhit|Facebot|Twitterbot|LinkedInBot|Discordbot|TelegramBot|Slackbot|SkypeUriPreview|WhatsApp|Googlebot|bingbot|Baiduspider|Bytespider|Sogou|YisouSpider|360Spider|DuckDuckBot|Applebot|Slurp|PetalBot|YandexBot|AhrefsBot|SemrushBot|DotBot|MJ12bot|SeznamBot) 1;
    # 微信链接预览抓取器（WindowsWechat / 无 Mobile 的桌面抓取）
    ~*MicroMessenger.*WindowsWechat 1;
    ~*WindowsWechat 1;
    # 钉钉外链预览
    ~*DingTalkBot 1;
    # 注意：不要写 ~*MicroMessenger 或 ~*NetType——手机微信/QQ 内打开也会命中，导致真人先看 SEO 壳再进 SPA
}

server {
    listen 80;
    server_name algo.zhiyuansofts.cn;

    root /www/wwwroot/cwxu-algo/front/dist;
    include /www/server/panel/vhost/nginx/extension/algo.zhiyuansofts.cn/*.conf;
    index index.html;

    charset utf-8;
    client_max_body_size 20m;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        application/wasm;

    location = /robots.txt {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8080/v1/user/seo/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        add_header Cache-Control "public, max-age=600";
    }

    location ~ ^/blog/[^/]+/manage {
        try_files $uri $uri/ /index.html;
    }

    # 公开页：爬虫 → SEO；真人 → SPA（禁止缓存 SEO 结果）
    location ~ ^/blog/ {
        error_page 418 = @seo_html;
        if ($is_seo_bot) {
            return 418;
        }
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/question-bank/detail/ {
        error_page 418 = @seo_html;
        if ($is_seo_bot) {
            return 418;
        }
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/profile {
        error_page 418 = @seo_html;
        if ($is_seo_bot) {
            return 418;
        }
        try_files $uri $uri/ /index.html;
    }

    location = /blog-plaza {
        error_page 418 = @seo_html;
        if ($is_seo_bot) {
            return 418;
        }
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/p/[A-Za-z0-9]+$ {
        error_page 418 = @seo_html;
        if ($is_seo_bot) {
            return 418;
        }
        try_files $uri $uri/ /index.html;
    }

    location @seo_html {
        proxy_pass http://127.0.0.1:8080/v1/user/seo/html?path=$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        # 禁止 CDN/浏览器缓存 SEO 页（避免爬虫页被真人命中）
        proxy_hide_header Cache-Control;
        add_header Cache-Control "private, no-store, no-cache, must-revalidate" always;
        add_header Vary "User-Agent" always;
        add_header Pragma "no-cache" always;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8080/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location ~* \.(js|css|woff2?|ttf|eot|map)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp|avif)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* (\.env|\.git|\.svn|\.idea|\.vscode|node_modules|Dockerfile|docker-compose\.yml|go\.mod|go\.sum|package(-lock)?\.json|pnpm-lock\.yaml|yarn\.lock)$ {
        return 404;
    }

    access_log /www/wwwlogs/algo.zhiyuansofts.cn.log;
    error_log  /www/wwwlogs/algo.zhiyuansofts.cn.error.log;

    #Monitor-Config-Start 网站监控报表日志发送配置
    access_log syslog:server=unix:/tmp/bt-monitor.sock,nohostname,tag=1__access monitor;
    error_log syslog:server=unix:/tmp/bt-monitor.sock,nohostname,tag=1__error;
    #Monitor-Config-End
}

# ---------- 若微信分享预览无标题/封面 ----------
# 把 map 里加回更宽规则（真人会看到正式加载壳，不再是纯文本）：
#   ~*MicroMessenger 1;
#   ~*QQ/ 1;
#
# 并确认 CDN 已按 User-Agent 分缓存或关闭 HTML 缓存。
