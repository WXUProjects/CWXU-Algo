# GoAlgo production nginx — algo.zhiyuansofts.cn
# 备份原配置：scripts/nginx-backup/algo.zhiyuansofts.cn.conf.bak-20260718
#
# SEO（恢复首版策略）：公开分享页 **一律** 反代 SEO HTML（不靠 UA 分流）。
# 微信/QQ 任意抓取 UA 都能拿到正确 title/OG；真人会先看到正式加载壳再 boot SPA。
# path 只走 X-Original-URI，避免 ?path=/profile?id=2 被截断。

server {
    listen 80;
    server_name algo.zhiyuansofts.cn;

    root /www/wwwroot/cwxu-algo/front/dist;
    include /www/server/panel/vhost/nginx/extension/algo.zhiyuansofts.cn/*.conf;
    index index.html;

    charset utf-8;
    client_max_body_size 20m;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        application/wasm;

    location = /robots.txt {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8080/v1/user/seo/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        add_header Cache-Control "public, max-age=600";
    }

    # 博客管理：始终纯 SPA
    location ~ ^/blog/[^/]+/manage {
        try_files $uri $uri/ /index.html;
    }

    # 题单加题页：管理态，纯 SPA
    location ~ ^/problemset/[^/]+/add-problem {
        try_files $uri $uri/ /index.html;
    }

    # ---------- 公开分享页：一律 SEO HTML（首版策略）----------
    location ~ ^/blog/ {
        proxy_pass http://127.0.0.1:8080/v1/user/seo/html;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "private, no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location ~ ^/question-bank/detail/ {
        proxy_pass http://127.0.0.1:8080/v1/user/seo/html;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "private, no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location ~ ^/problemset {
        proxy_pass http://127.0.0.1:8080/v1/user/seo/html;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "private, no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location ~ ^/profile {
        proxy_pass http://127.0.0.1:8080/v1/user/seo/html;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "private, no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location = /blog-plaza {
        proxy_pass http://127.0.0.1:8080/v1/user/seo/html;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "private, no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location ~ ^/p/[A-Za-z0-9]+$ {
        proxy_pass http://127.0.0.1:8080/v1/user/seo/html;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "private, no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location = /tools/paste {
        proxy_pass http://127.0.0.1:8080/v1/user/seo/html;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "private, no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8080/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location ~* \.(js|css|woff2?|ttf|eot|map)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp|avif)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* (\.env|\.git|\.svn|\.idea|\.vscode|node_modules|Dockerfile|docker-compose\.yml|go\.mod|go\.sum|package(-lock)?\.json|pnpm-lock\.yaml|yarn\.lock)$ {
        return 404;
    }

    access_log /www/wwwlogs/algo.zhiyuansofts.cn.log;
    error_log  /www/wwwlogs/algo.zhiyuansofts.cn.error.log;

    #Monitor-Config-Start 网站监控报表日志发送配置
    access_log syslog:server=unix:/tmp/bt-monitor.sock,nohostname,tag=1__access monitor;
    error_log syslog:server=unix:/tmp/bt-monitor.sock,nohostname,tag=1__error;
    #Monitor-Config-End
}

# ---------- 运维说明 ----------
# 1) 覆盖宝塔站点 conf 后：nginx -t && nginx -s reload
# 2) 后端 user 服务需已部署含 SEO 路由的版本
# 3) 微信/QQ 卡片有缓存：改 meta 后用调试工具清缓存或换 URL 参数验证
# 4) 不再依赖 map $http_user_agent（可从 http{} 删掉旧 $is_seo_bot，可选）
