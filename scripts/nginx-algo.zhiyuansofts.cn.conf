# GoAlgo production nginx — algo.zhiyuansofts.cn
# 备份原配置：scripts/nginx-backup/algo.zhiyuansofts.cn.conf.bak-20260718
# 部署：覆盖宝塔站点配置 → nginx -t → nginx -s reload
#
# API 网关：127.0.0.1:8080 （/api/* → /v1/*）
# 前端 dist：/www/wwwroot/cwxu-algo/front/dist
#
# SEO 策略：仅爬虫/分享抓取 UA 走 SEO HTML；真人始终纯 SPA（无二次跳转）

# 放在 http{} 或本文件顶部（宝塔站点 conf 若不能写 map，见文末「备选」）
map $http_user_agent $is_seo_bot {
    default 0;
    ~*(MicroMessenger|QQ/|DingTalk|bot|spider|crawler|slurp|facebookexternalhit|Twitterbot|LinkedInBot|Discordbot|TelegramBot|Bytespider|Baiduspider|Sogou|YisouSpider|360Spider|Applebot|bingbot|Googlebot|DuckDuckBot|Slackbot|WhatsApp|preview) 1;
}

server {
    listen 80;
    server_name algo.zhiyuansofts.cn;

    root /www/wwwroot/cwxu-algo/front/dist;
    include /www/server/panel/vhost/nginx/extension/algo.zhiyuansofts.cn/*.conf;
    index index.html;

    charset utf-8;
    client_max_body_size 20m;

    # ========== 安全 Header ==========
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ========== gzip ==========
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        application/wasm;

    # ========== robots / sitemap（必须在 SPA 之前）==========
    location = /robots.txt {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8080/v1/user/seo/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        add_header Cache-Control "public, max-age=600";
    }

    # ========== 博客管理：始终 SPA ==========
    location ~ ^/blog/[^/]+/manage {
        try_files $uri $uri/ /index.html;
    }

    # ========== 公开页：爬虫 → SEO HTML；真人 → SPA ==========
    location ~ ^/blog/ {
        error_page 418 = @seo_html;
        if ($is_seo_bot) {
            return 418;
        }
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/question-bank/detail/ {
        error_page 418 = @seo_html;
        if ($is_seo_bot) {
            return 418;
        }
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/profile {
        error_page 418 = @seo_html;
        if ($is_seo_bot) {
            return 418;
        }
        try_files $uri $uri/ /index.html;
    }

    location = /blog-plaza {
        error_page 418 = @seo_html;
        if ($is_seo_bot) {
            return 418;
        }
        try_files $uri $uri/ /index.html;
    }

    # 粘贴板公开页 /p/:slug
    location ~ ^/p/[A-Za-z0-9]+$ {
        error_page 418 = @seo_html;
        if ($is_seo_bot) {
            return 418;
        }
        try_files $uri $uri/ /index.html;
    }

    location @seo_html {
        proxy_pass http://127.0.0.1:8080/v1/user/seo/html?path=$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        add_header Cache-Control "public, max-age=120";
    }

    # ========== API 反向代理（/api/* → 网关 /v1/*）==========
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8080/v1/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ========== 静态资源缓存 ==========
    location ~* \.(js|css|woff2?|ttf|eot|map)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp|avif)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # ========== SPA 回退 ==========
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ========== 禁止访问敏感文件 ==========
    location ~* (\.env|\.git|\.svn|\.idea|\.vscode|node_modules|Dockerfile|docker-compose\.yml|go\.mod|go\.sum|package(-lock)?\.json|pnpm-lock\.yaml|yarn\.lock)$ {
        return 404;
    }

    # ========== 日志 ==========
    access_log /www/wwwlogs/algo.zhiyuansofts.cn.log;
    error_log  /www/wwwlogs/algo.zhiyuansofts.cn.error.log;

    #Monitor-Config-Start 网站监控报表日志发送配置
    access_log syslog:server=unix:/tmp/bt-monitor.sock,nohostname,tag=1__access monitor;
    error_log syslog:server=unix:/tmp/bt-monitor.sock,nohostname,tag=1__error;
    #Monitor-Config-End
}

# ---------- 备选：宝塔站点 conf 里不能写 map 时 ----------
# 1) 把上面的 map 块粘到 /www/server/nginx/conf/nginx.conf 的 http { } 内
