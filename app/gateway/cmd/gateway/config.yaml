# This is a gateway config.
name: cwxu-algo
version: v1
middlewares:
  - name: jwt
    options:
      '@type': type.googleapis.com/gateway.middleware.jwt.v1.JWT
      # 与 user/core_data/agent 的 server.jwt_secret 保持一致，至少 32 字符。
      secret: ""
endpoints:
  - path: /v1/user/*
    timeout: 5s
    protocol: HTTP
    backends:
#      - target: '127.0.0.1:8001'
      - target: 'discovery:///user'
#          stripPrefix: /bbs
  - path: /v1/core/*
    timeout: 5s
    protocol: HTTP
    backends:
      - target: 'discovery:///core-data'
  - path: /v1/agent/*
    timeout: 5s
    protocol: HTTP
    backends:
      - target: 'discovery:///agent'
