syntax = "proto3";

package api.core.v1.problem;

import "google/api/annotations.proto";
option go_package = "cwxu-algo/api/core/v1/problem;problem";
option java_multiple_files = true;
option java_package = "api.core.v1.problem";

service Problem {
  rpc List (ListProblemReq) returns (ListProblemRes) {
    option (google.api.http) = {
      get: "/v1/core/problem/list"
    };
  }
  rpc Get (GetProblemReq) returns (GetProblemRes) {
    option (google.api.http) = {
      get: "/v1/core/problem/get"
    };
  }
  rpc ListSubmissions (ListSubmissionsReq) returns (ListSubmissionsRes) {
    option (google.api.http) = {
      get: "/v1/core/problem/submissions"
    };
  }
  rpc UserProfile (UserProfileReq) returns (UserProfileRes) {
    option (google.api.http) = {
      get: "/v1/core/problem/user-profile"
    };
  }
  rpc Progress (ProgressReq) returns (ProgressRes) {
    option (google.api.http) = {
      get: "/v1/core/problem/progress"
    };
  }
  rpc Backfill (BackfillReq) returns (BackfillRes) {
    option (google.api.http) = {
      post: "/v1/core/problem/backfill"
      body: "*"
    };
  }
  // 紧急停止：暂停 AI 并清空分析队列（兼容）
  rpc EmergencyStop (EmergencyStopReq) returns (EmergencyStopRes) {
    option (google.api.http) = {
      post: "/v1/core/problem/emergency-stop"
      body: "*"
    };
  }
  // 全部重置：清空 AI 标签，保留题面，可选重新入队分析
  rpc ResetAll (ResetAllReq) returns (ResetAllRes) {
    option (google.api.http) = {
      post: "/v1/core/problem/reset-all"
      body: "*"
    };
  }
  // 恢复 AI（兼容）
  rpc Resume (ResumeReq) returns (ResumeRes) {
    option (google.api.http) = {
      post: "/v1/core/problem/resume"
      body: "*"
    };
  }
  // 重试错误队列：仅重入 FAILED（可重试），排除 FAILED_PERM 黑名单
  rpc RetryFailed (RetryFailedReq) returns (RetryFailedRes) {
    option (google.api.http) = {
      post: "/v1/core/problem/retry-failed"
      body: "*"
    };
  }
  // 暂停/恢复 AI 分析（暂停时清空分析队列）
  rpc ToggleAnalyze (TogglePipelineReq) returns (TogglePipelineRes) {
    option (google.api.http) = {
      post: "/v1/core/problem/toggle-analyze"
      body: "*"
    };
  }
  // 暂停/恢复题面爬取（暂停时清空爬取队列）
  rpc ToggleFetch (TogglePipelineReq) returns (TogglePipelineRes) {
    option (google.api.http) = {
      post: "/v1/core/problem/toggle-fetch"
      body: "*"
    };
  }
}

message SolutionMeta {
  string name = 1;
  string time_complexity = 2;
  string space_complexity = 3;
  string brief_explanation = 4;
}

message ProblemInfo {
  uint32 id = 1;
  string platform = 2;
  string external_id = 3;
  string title = 4;
  string url = 5;
  string content_md = 6;
  string problem_type = 7;
  repeated string tags = 8;
  repeated SolutionMeta solutions = 9;
  string difficulty = 10;
  string status = 11;
  string error_msg = 12;
  int64 last_submitted_at = 13;
  // 当前用户对该题状态: AC / TRIED / NONE（仅 list 且传 userId 时）
  string user_status = 14;
}

message ListProblemReq {
  int64 page = 1;
  int64 page_size = 2;
  // 排序: latest_desc(默认) / latest_asc
  string sort = 3;
  // 多平台逗号分隔
  string platforms = 4;
  // 标签逗号分隔，匹配任一
  string tags = 5;
  // 用户做题状态过滤: AC / TRIED / NONE（需 user_id）
  string user_status = 6;
  int64 user_id = 7;
  // 关键词：匹配 title / external_id（模糊）
  string keyword = 8;
  // 难度：简单 / 中等 / 困难
  string difficulty = 9;
}

message ListProblemRes {
  int64 code = 1;
  string message = 2;
  repeated ProblemInfo data = 3;
  int64 total = 4;
  int64 page = 5;
  int64 page_size = 6;
}

message GetProblemReq {
  uint32 id = 1;
}

message GetProblemRes {
  int64 code = 1;
  string message = 2;
  ProblemInfo data = 3;
}

message SubmissionInfo {
  uint32 id = 1;
  int64 user_id = 2;
  string platform = 3;
  string submit_id = 4;
  string lang = 5;
  string status = 6;
  int64 time = 7;
  string contest = 8;
  string user_name = 9; // 展示用姓名
}

message ListSubmissionsReq {
  uint32 problem_id = 1;
  int64 page = 2;
  int64 page_size = 3;
  int64 user_id = 4;
}

message ListSubmissionsRes {
  int64 code = 1;
  string message = 2;
  repeated SubmissionInfo data = 3;
  int64 total = 4;
}

message TagScore {
  string tag = 1;
  double score = 2;
  int64 ac_count = 3;
}

message NamedCount {
  string name = 1;
  int64 count = 2;
}

message UserProfileReq {
  int64 user_id = 1;
}

message UserProfileRes {
  int64 code = 1;
  string message = 2;
  repeated TagScore radar = 3;
  repeated NamedCount platforms = 4;
  repeated NamedCount difficulties = 5;
  int64 total_ac = 6;
}

message ProgressReq {}

message ProgressItem {
  string status = 1;
  int64 count = 2;
}

message FailedProblem {
  uint32 id = 1;
  string platform = 2;
  string external_id = 3;
  string title = 4;
  string error_msg = 5;
  int64 updated_at = 6;
  string status = 7;
  int32 fetch_attempts = 8;
}

message ActiveJob {
  uint32 problem_id = 1;
  string platform = 2;
  string external_id = 3;
  string title = 4;
  string stage = 5; // fetch | analyze
  int64 started_at = 6;
}

message QueueStatus {
  string name = 1;
  int64 messages = 2; // 积压消息数
  int64 consumers = 3;
  int64 concurrency = 4;
}

message ProgressRes {
  int64 code = 1;
  string message = 2;
  repeated ProgressItem items = 3;
  repeated FailedProblem recent_failed = 4;
  int64 total = 5;
  bool paused = 6; // AI 暂停（兼容）
  repeated ActiveJob active_jobs = 7;
  repeated QueueStatus queues = 8;
  repeated FailedProblem in_progress = 9; // DB 中 FETCHING/TAGGING
  bool fetch_paused = 10;
  bool analyze_paused = 11;
  repeated FailedProblem recent_failed_perm = 12; // 永久失败，可点进详情
}

message BackfillReq {
  // 最大处理条数，0 表示默认 500
  int64 limit = 1;
}

message BackfillRes {
  int64 code = 1;
  string message = 2;
  int64 scanned = 3;
  int64 bound = 4;
  int64 created = 5;
  int64 enqueued = 6;
}

message EmergencyStopReq {}

message EmergencyStopRes {
  int64 code = 1;
  string message = 2;
  int64 purged_fetch = 3;
  int64 purged_analyze = 4;
}

message ResetAllReq {
  // 是否重新入队爬取；false 表示只重置状态并清空队列
  bool requeue = 1;
  // 兼容 proto3 默认值：true 时使用 requeue 字段，false 时默认 requeue=true
  bool requeue_set = 2;
}

message ResetAllRes {
  int64 code = 1;
  string message = 2;
  int64 reset = 3;
  int64 enqueued = 4;
  int64 purged_fetch = 5;
  int64 purged_analyze = 6;
}

message ResumeReq {}

message ResumeRes {
  int64 code = 1;
  string message = 2;
}

message RetryFailedReq {
  // 最大重试条数，0 表示不限制
  int64 limit = 1;
}

message RetryFailedRes {
  int64 code = 1;
  string message = 2;
  // 扫描到的 FAILED 数
  int64 scanned = 3;
  // 成功入队数
  int64 enqueued = 4;
  // 升为 FAILED_PERM（黑名单）的数量
  int64 blacklisted = 5;
}

// pause=true 暂停并清队列；pause=false 恢复；未设置时按当前状态翻转
message TogglePipelineReq {
  bool pause = 1;
  bool pause_set = 2;
}

message TogglePipelineRes {
  int64 code = 1;
  string message = 2;
  bool paused = 3;
  int64 purged = 4;
}
