syntax = "proto3";

package api.core.v1.problem;

import "google/api/annotations.proto";
option go_package = "cwxu-algo/api/core/v1/problem;problem";
option java_multiple_files = true;
option java_package = "api.core.v1.problem";

service Problem {
  rpc List (ListProblemReq) returns (ListProblemRes) {
    option (google.api.http) = {
      get: "/v1/core/problem/list"
    };
  }
  // 标签聚合（名称 + 题量），供筛选器选择
  rpc ListTags (ListTagsReq) returns (ListTagsRes) {
    option (google.api.http) = {
      get: "/v1/core/problem/tags"
    };
  }
  // 全站热题：近 N 天按提交次数 / 做题人数 / AC 次数综合热度排序
  rpc Hot (HotProblemReq) returns (HotProblemRes) {
    option (google.api.http) = {
      get: "/v1/core/problem/hot"
    };
  }
  rpc Get (GetProblemReq) returns (GetProblemRes) {
    option (google.api.http) = {
      get: "/v1/core/problem/get"
    };
  }
  // 本题出现过的比赛（contest_problems 反查，全平台）
  rpc RelatedContests (RelatedContestsReq) returns (RelatedContestsRes) {
    option (google.api.http) = {
      get: "/v1/core/problem/related-contests"
    };
  }
  rpc ListSubmissions (ListSubmissionsReq) returns (ListSubmissionsRes) {
    option (google.api.http) = {
      get: "/v1/core/problem/submissions"
    };
  }
  // 关注用户对本题状态（不受组织域限制；需登录）
  rpc FollowingStatus (FollowingStatusReq) returns (FollowingStatusRes) {
    option (google.api.http) = {
      get: "/v1/core/problem/following-status"
    };
  }
  rpc UserProfile (UserProfileReq) returns (UserProfileRes) {
    option (google.api.http) = {
      get: "/v1/core/problem/user-profile"
    };
  }
  rpc Progress (ProgressReq) returns (ProgressRes) {
    option (google.api.http) = {
      get: "/v1/core/problem/progress"
    };
  }
  rpc Backfill (BackfillReq) returns (BackfillRes) {
    option (google.api.http) = {
      post: "/v1/core/problem/backfill"
      body: "*"
    };
  }
  // 紧急停止：暂停 AI 并清空分析队列（兼容）
  rpc EmergencyStop (EmergencyStopReq) returns (EmergencyStopRes) {
    option (google.api.http) = {
      post: "/v1/core/problem/emergency-stop"
      body: "*"
    };
  }
  // 全部重置：清空 AI 标签，保留题面，可选重新入队分析
  rpc ResetAll (ResetAllReq) returns (ResetAllRes) {
    option (google.api.http) = {
      post: "/v1/core/problem/reset-all"
      body: "*"
    };
  }
  // 恢复 AI（兼容）
  rpc Resume (ResumeReq) returns (ResumeRes) {
    option (google.api.http) = {
      post: "/v1/core/problem/resume"
      body: "*"
    };
  }
  // 重试错误队列：默认仅 FAILED；include_permanent=true 时含可恢复的 FAILED_PERM
  rpc RetryFailed (RetryFailedReq) returns (RetryFailedRes) {
    option (google.api.http) = {
      post: "/v1/core/problem/retry-failed"
      body: "*"
    };
  }
  // 清空近期失败：近 6 月 FAILED → FAILED_PERM，停止自动退避重试
  rpc ClearRecentFailed (ClearRecentFailedReq) returns (ClearRecentFailedRes) {
    option (google.api.http) = {
      post: "/v1/core/problem/clear-recent-failed"
      body: "*"
    };
  }
  // 清空牛客题面并强制重爬：只清 content_md，保留 tags / solutions_meta
  rpc ClearNowCoderContent (ClearNowCoderContentReq) returns (ClearNowCoderContentRes) {
    option (google.api.http) = {
      post: "/v1/core/problem/clear-nowcoder-content"
      body: "*"
    };
  }
  // 暂停/恢复 AI 分析（仅停消费，不清空队列）
  rpc ToggleAnalyze (TogglePipelineReq) returns (TogglePipelineRes) {
    option (google.api.http) = {
      post: "/v1/core/problem/toggle-analyze"
      body: "*"
    };
  }
  // 暂停/恢复题面爬取（仅停消费，不清空队列）
  rpc ToggleFetch (TogglePipelineReq) returns (TogglePipelineRes) {
    option (google.api.http) = {
      post: "/v1/core/problem/toggle-fetch"
      body: "*"
    };
  }
  // 重置 MQ 队列：purge 爬取/分析队列，再按 DB 待爬取/待分析重灌（低优先级）
  rpc ResetQueues (ResetQueuesReq) returns (ResetQueuesRes) {
    option (google.api.http) = {
      post: "/v1/core/problem/reset-queues"
      body: "*"
    };
  }
  // 站点管理员：直接修改标签/题面（无需审核）
  rpc AdminUpdate (AdminUpdateProblemReq) returns (AdminUpdateProblemRes) {
    option (google.api.http) = {
      post: "/v1/core/problem/admin-update"
      body: "*"
    };
  }
  // 登录用户：提交标签/题面修改申请（站点管理员审核）
  rpc ProposeEdit (ProposeProblemEditReq) returns (ProposeProblemEditRes) {
    option (google.api.http) = {
      post: "/v1/core/problem/propose-edit"
      body: "*"
    };
  }
  // 站点管理员：审核申请列表
  rpc ListEditRequests (ListProblemEditReq) returns (ListProblemEditRes) {
    option (google.api.http) = {
      get: "/v1/core/problem/edit-requests"
    };
  }
  // 站点管理员：通过/驳回申请
  rpc ReviewEdit (ReviewProblemEditReq) returns (ReviewProblemEditRes) {
    option (google.api.http) = {
      post: "/v1/core/problem/review-edit"
      body: "*"
    };
  }
  // 当前用户对该题的待审申请（详情页提示）
  rpc MyPendingEdit (MyPendingEditReq) returns (MyPendingEditRes) {
    option (google.api.http) = {
      get: "/v1/core/problem/my-pending-edit"
    };
  }
}

message SolutionMeta {
  string name = 1;
  string time_complexity = 2;
  string space_complexity = 3;
  string brief_explanation = 4;
}

message ProblemInfo {
  uint32 id = 1;
  string platform = 2;
  string external_id = 3;
  string title = 4;
  string url = 5;
  string content_md = 6;
  string problem_type = 7;
  repeated string tags = 8;
  repeated SolutionMeta solutions = 9;
  string difficulty = 10;
  string status = 11;
  string error_msg = 12;
  int64 last_submitted_at = 13;
  // 当前用户对该题状态: AC / TRIED / NONE（仅 list 且传 userId 时）
  string user_status = 14;
}

message ListProblemReq {
  int64 page = 1;
  int64 page_size = 2;
  // 排序: latest_desc(默认) / latest_asc
  string sort = 3;
  // 多平台逗号分隔
  string platforms = 4;
  // 标签逗号分隔，匹配任一
  string tags = 5;
  // 用户做题状态过滤: AC / TRIED / NONE（需 user_id）
  string user_status = 6;
  int64 user_id = 7;
  // 关键词：匹配 title / external_id（模糊）
  string keyword = 8;
  // 难度：简单 / 中等 / 困难
  string difficulty = 9;
  // 仅显示关注用户提交过的题目（需登录）
  bool following_only = 10;
}

message ListProblemRes {
  int64 code = 1;
  string message = 2;
  repeated ProblemInfo data = 3;
  int64 total = 4;
  int64 page = 5;
  int64 page_size = 6;
}

message ListTagsReq {
  // 返回条数上限，默认 100，最大 300
  int32 limit = 1;
}

message TagCount {
  string tag = 1;
  int64 count = 2;
}

// Hot 全站热题
message HotProblemReq {
  int64 page = 1;
  int64 page_size = 2;
  // 统计窗口天数，默认 2，允许 1–7
  int32 days = 3;
}

message HotProblemItem {
  ProblemInfo problem = 1;
  // 窗口内提交次数（排除力扣合成/不计入提交的行）
  int64 submit_count = 2;
  // 窗口内做题人数（去重 user_id）
  int64 solver_count = 3;
  // 窗口内 AC 次数
  int64 ac_count = 4;
  // 综合热度分（服务端权重：submit*1 + solver*3 + ac*2）
  double score = 5;
  // 窗口内最近一次提交时间 unix 秒
  int64 last_submitted_at = 6;
}

message HotProblemRes {
  int64 code = 1;
  string message = 2;
  repeated HotProblemItem data = 3;
  int64 total = 4;
  int64 page = 5;
  int64 page_size = 6;
  // 实际使用的窗口天数
  int32 days = 7;
}

message ListTagsRes {
  int64 code = 1;
  string message = 2;
  repeated TagCount data = 3;
}

message GetProblemReq {
  uint32 id = 1;
}

message GetProblemRes {
  int64 code = 1;
  string message = 2;
  ProblemInfo data = 3;
}

// 题目关联的一场比赛（站内详情用 contest_log_id → /contest/{id}）
message ProblemRelatedContest {
  string platform = 1;
  // OJ 侧比赛 id（如牛客 137561、CF 1791）
  string contest_id = 2;
  // 本场题号 A/B/C
  string label = 3;
  // 比赛名称（来自 contest_logs，可能为空）
  string contest_name = 4;
  // 站内 contest_logs 任一行 id，用于跳转详情
  uint32 contest_log_id = 5;
  // 比赛时间 unix 秒
  int64 contest_time = 6;
  // 本场内题目展示名（可选）
  string problem_title = 7;
  // 外链（contest_logs.contest_url，可选）
  string contest_url = 8;
}

message RelatedContestsReq {
  uint32 problem_id = 1;
}

message RelatedContestsRes {
  int64 code = 1;
  string message = 2;
  repeated ProblemRelatedContest data = 3;
}

message SubmissionInfo {
  uint32 id = 1;
  int64 user_id = 2;
  string platform = 3;
  string submit_id = 4;
  string lang = 5;
  string status = 6;
  int64 time = 7;
  string contest = 8;
  string user_name = 9; // 展示用姓名
}

message ListSubmissionsReq {
  uint32 problem_id = 1;
  int64 page = 2;
  int64 page_size = 3;
  int64 user_id = 4;
  // 仅显示关注用户的提交（需登录；不受组织域限制）
  bool following_only = 5;
  // 状态筛选：空=全部；AC=仅通过
  string status = 6;
}

message ListSubmissionsRes {
  int64 code = 1;
  string message = 2;
  repeated SubmissionInfo data = 3;
  int64 total = 4;
}

message FollowingStatusReq {
  uint32 problem_id = 1;
}

message FollowingStatusItem {
  int64 user_id = 1;
  string username = 2;
  string name = 3;
  string avatar = 4;
  // AC | TRIED | NONE
  string status = 5;
}

message FollowingStatusRes {
  int64 code = 1;
  string message = 2;
  repeated FollowingStatusItem data = 3;
}

message TagScore {
  string tag = 1;
  double score = 2;
  int64 ac_count = 3;
}

message NamedCount {
  string name = 1;
  int64 count = 2;
}

message UserProfileReq {
  int64 user_id = 1;
}

message UserProfileRes {
  int64 code = 1;
  string message = 2;
  repeated TagScore radar = 3;
  repeated NamedCount platforms = 4;
  repeated NamedCount difficulties = 5;
  int64 total_ac = 6;
}

message ProgressReq {}

message ProgressItem {
  string status = 1;
  int64 count = 2;
}

message FailedProblem {
  uint32 id = 1;
  string platform = 2;
  string external_id = 3;
  string title = 4;
  string error_msg = 5;
  int64 updated_at = 6;
  string status = 7;
  int32 fetch_attempts = 8;
}

message ActiveJob {
  uint32 problem_id = 1;
  string platform = 2;
  string external_id = 3;
  string title = 4;
  string stage = 5; // fetch | analyze
  int64 started_at = 6;
}

message QueueStatus {
  string name = 1;
  int64 messages = 2; // 积压消息数
  int64 consumers = 3;
  int64 concurrency = 4;
}

message ProgressRes {
  int64 code = 1;
  string message = 2;
  repeated ProgressItem items = 3;
  repeated FailedProblem recent_failed = 4;
  int64 total = 5;
  bool paused = 6; // AI 暂停（兼容）
  repeated ActiveJob active_jobs = 7;
  repeated QueueStatus queues = 8;
  repeated FailedProblem in_progress = 9; // DB 中 FETCHING/TAGGING
  bool fetch_paused = 10;
  bool analyze_paused = 11;
  repeated FailedProblem recent_failed_perm = 12; // 永久失败，可点进详情
}

message BackfillReq {
  // 绑定未关联提交的最大条数，0 表示默认 5000
  int64 limit = 1;
}

message BackfillRes {
  int64 code = 1;
  string message = 2;
  int64 scanned = 3;
  int64 bound = 4;
  int64 created = 5;
  // 入队总数（爬取 + 分析）
  int64 enqueued = 6;
  int64 enqueued_fetch = 7;
  int64 enqueued_analyze = 8;
}

// 重置 MQ：清空队列后按 DB 状态重灌
message ResetQueuesReq {}

message ResetQueuesRes {
  int64 code = 1;
  string message = 2;
  int64 purged_fetch = 3;
  int64 purged_analyze = 4;
  int64 enqueued_fetch = 5;
  int64 enqueued_analyze = 6;
}

message EmergencyStopReq {}

message EmergencyStopRes {
  int64 code = 1;
  string message = 2;
  int64 purged_fetch = 3;
  int64 purged_analyze = 4;
}

message ResetAllReq {
  // 是否重新入队爬取；false 表示只重置状态并清空队列
  bool requeue = 1;
  // 兼容 proto3 默认值：true 时使用 requeue 字段，false 时默认 requeue=true
  bool requeue_set = 2;
}

message ResetAllRes {
  int64 code = 1;
  string message = 2;
  int64 reset = 3;
  int64 enqueued = 4;
  int64 purged_fetch = 5;
  int64 purged_analyze = 6;
}

message ResumeReq {}

message ResumeRes {
  int64 code = 1;
  string message = 2;
}

message RetryFailedReq {
  // 最大重试条数，0 表示不限制
  int64 limit = 1;
  // true：同时重试近 6 月 FAILED_PERM（非硬永久错误，如 DOM/WAF/暂无权限）
  bool include_permanent = 2;
}

message RetryFailedRes {
  int64 code = 1;
  string message = 2;
  // 扫描到的 FAILED 数
  int64 scanned = 3;
  // 成功入队数
  int64 enqueued = 4;
  // 升为 FAILED_PERM（黑名单）的数量
  int64 blacklisted = 5;
}

message ClearRecentFailedReq {}

message ClearRecentFailedRes {
  int64 code = 1;
  string message = 2;
  // 停止自动重试的题目数（FAILED → FAILED_PERM）
  int64 cleared = 3;
}

message ClearNowCoderContentReq {
  // true（默认）：清空后入队强制重爬题面；false：只清空
  bool requeue = 1;
  bool requeue_set = 2;
}

message ClearNowCoderContentRes {
  int64 code = 1;
  string message = 2;
  int64 cleared = 3;
  int64 enqueued = 4;
}

// pause=true 暂停（保留队列）；pause=false 恢复；未设置时按当前状态翻转
message TogglePipelineReq {
  bool pause = 1;
  bool pause_set = 2;
}

message TogglePipelineRes {
  int64 code = 1;
  string message = 2;
  bool paused = 3;
  // 兼容字段：暂停不再 purge，恒为 0
  int64 purged = 4;
}

// 站点管理员直接改题：有字段才更新（update_tags / update_content 显式开关）
message AdminUpdateProblemReq {
  uint32 id = 1;
  bool update_tags = 2;
  repeated string tags = 3;
  bool update_content = 4;
  string content_md = 5;
  string title = 6; // 非空才改标题
}

message AdminUpdateProblemRes {
  int64 code = 1;
  string message = 2;
  ProblemInfo data = 3;
}

// 用户提交修改申请：至少改标签或题面其一
message ProposeProblemEditReq {
  uint32 problem_id = 1;
  bool update_tags = 2;
  repeated string tags = 3;
  bool update_content = 4;
  string content_md = 5;
  string title = 6;
  string note = 7; // 可选说明
}

message ProposeProblemEditRes {
  int64 code = 1;
  string message = 2;
  uint32 request_id = 3;
}

message ListProblemEditReq {
  int64 page = 1;
  int64 page_size = 2;
  // pending | approved | rejected | 空=全部
  string status = 3;
}

message ProblemEditInfo {
  uint32 id = 1;
  uint32 problem_id = 2;
  string platform = 3;
  string external_id = 4;
  string problem_title = 5;
  uint32 user_id = 6;
  string user_name = 7;
  bool has_tags = 8;
  bool has_content = 9;
  repeated string proposed_tags = 10;
  string proposed_content_md = 11;
  string proposed_title = 12;
  string note = 13;
  string status = 14;
  uint32 reviewer_id = 15;
  string review_note = 16;
  int64 created_at = 17;
  int64 updated_at = 18;
  // 当前线上快照（便于对比）
  repeated string current_tags = 19;
  string current_content_md = 20;
  string current_title = 21;
}

message ListProblemEditRes {
  int64 code = 1;
  string message = 2;
  repeated ProblemEditInfo data = 3;
  int64 total = 4;
  int64 page = 5;
  int64 page_size = 6;
}

message ReviewProblemEditReq {
  uint32 id = 1;
  bool approve = 2;
  string review_note = 3;
}

message ReviewProblemEditRes {
  int64 code = 1;
  string message = 2;
}

message MyPendingEditReq {
  uint32 problem_id = 1;
}

message MyPendingEditRes {
  int64 code = 1;
  string message = 2;
  bool has_pending = 3;
  ProblemEditInfo data = 4;
}
