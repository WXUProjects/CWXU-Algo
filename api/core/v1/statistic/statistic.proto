syntax = "proto3";

package api.core.v1.statistic;
import "google/api/annotations.proto";
option go_package = "cwxu-algo/api/core/v1/statistic;statistic";
option java_multiple_files = true;
option java_package = "api.core.v1.statistic";

service Statistic {
  rpc Heatmap(HeatmapReq) returns (HeatmapResp) {
    option (google.api.http) = {
      get: "/v1/core/statistic/heatmap"
    };
  }
  rpc PeriodCount(PeriodCountReq) returns (PeriodCountResp) {
    option (google.api.http) = {
      get: "/v1/core/statistic/period"
    };
  }
  // Rank 按时间区间获取提交/AC 排行（供周报等场景）
  rpc Rank(RankReq) returns (RankResp) {
    option (google.api.http) = {
      get: "/v1/core/statistic/rank"
    };
  }
}

message HeatmapReq {
  int64 userId = 1;
  string startDate = 2;
  string endDate = 3;
  bool isAc = 4;
}

message HeatmapResp {
  message  HeatmapItem {
    string date = 1;
    int64 count = 2;
  }
  int64 code = 1;
  repeated HeatmapItem data = 2;
}

message PeriodCountReq {
  int64 userId = 1;
}

message PeriodCountResp {
  int64 code = 1;
  PeriodData data = 2;
}

message PeriodData {
  SubmitCount submit = 1;
  AcCount ac = 2;
}

message SubmitCount {
  int64 today = 1;
  int64 thisWeek = 2;
  int64 lastWeek = 3;
  int64 thisMonth = 4;
  int64 lastMonth = 5;
  int64 thisYear = 6;
  int64 lastYear = 7;
  int64 total = 8;
}

message AcCount {
  // today…thisYear：按题去重后的 AC 题数（时段内做过的题）
  int64 today = 1;
  int64 thisWeek = 2;
  int64 lastWeek = 3;
  int64 thisMonth = 4;
  int64 lastMonth = 5;
  int64 thisYear = 6;
  int64 lastYear = 7;
  // total：生涯按题去重（累计题数）
  int64 total = 8;
  // totalRaw：生涯 AC 次数（不去重，同一题多次 AC 全计）
  int64 totalRaw = 9;
}

message RankReq {
  // 开始日期 YYYY-MM-DD（含）
  string startDate = 1;
  // 结束日期 YYYY-MM-DD（含）
  string endDate = 2;
  // submit | ac，默认 submit
  string scoreType = 3;
  // 分页，默认 page=1 pageSize=10
  int64 page = 4;
  int64 pageSize = 5;
  // 分组筛选，-1 或不传表示全部
  int64 groupId = 6;
}

message RankItem {
  int64 rank = 1;
  int64 userId = 2;
  string name = 3;
  int64 score = 4;
}

message RankResp {
  int64 code = 1;
  repeated RankItem data = 2;
  int64 total = 3;
}