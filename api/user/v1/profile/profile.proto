syntax = "proto3";

package api.user.v1;
import "google/api/annotations.proto";
option go_package = "cwxu-algo/api/user/v1/profile;profile";
option java_multiple_files = true;
option java_package = "api.user.v1";

service Profile {
  rpc GetById (GetByIdReq) returns (GetByIdRes) {
    option (google.api.http) = {
      get: "/v1/user/profile/get-by-id"
    };
  }
  rpc GetByName (GetByNameReq) returns (GetByNameRes) {
    option (google.api.http) = {
      get: "/v1/user/profile/get-by-name"
    };
  }
  rpc GetList (GetListReq) returns (GetListRes) {
    option (google.api.http) = {
      get: "/v1/user/profile/list"
    };
  }
  rpc Update (UpdateReq) returns (UpdateRes) {
    option (google.api.http) = {
      post: "/v1/user/profile/update",
      body: "*",
    };
  }
  rpc MoveGroup (MoveGroupReq) returns (MoveGroupRes) {
    option (google.api.http) = {
      post: "/v1/user/profile/move-group",
      body: "*",
    };
  }
  rpc SetEmailEnabled (SetEmailEnabledReq) returns (SetEmailEnabledRes) {
    option (google.api.http) = {
      post: "/v1/user/profile/set-email-enabled",
      body: "*",
    };
  }
  // 站点管理员：个人题面爬取 / 题面 AI 覆盖开关（kind=fetch|ai）
  rpc SetProblemPipeline (SetProblemPipelineReq) returns (SetProblemPipelineRes) {
    option (google.api.http) = {
      post: "/v1/user/profile/set-problem-pipeline",
      body: "*",
    };
  }
  // 站点管理员：个人爬取间隔 / AI 总结间隔覆盖（优先级高于组织 MIN）
  rpc SetSyncIntervals (SetSyncIntervalsReq) returns (SetSyncIntervalsRes) {
    option (google.api.http) = {
      post: "/v1/user/profile/set-sync-intervals",
      body: "*",
    };
  }
  // 站点管理员：标记用户永不休眠（跳过不活跃判定）
  rpc SetSyncExempt (SetSyncExemptReq) returns (SetSyncExemptRes) {
    option (google.api.http) = {
      post: "/v1/user/profile/set-sync-exempt",
      body: "*",
    };
  }
  // 站点管理员：批量解除不活跃（仅刷新 last_login_at 为当前时间；超时后仍会再休眠）
  rpc ClearDormant (ClearDormantReq) returns (ClearDormantRes) {
    option (google.api.http) = {
      post: "/v1/user/profile/clear-dormant",
      body: "*",
    };
  }
  rpc GetUserIdsByGroup (GetUserIdsByGroupReq) returns (GetUserIdsByGroupRes) {
    option (google.api.http) = {
      get: "/v1/user/profile/ids-by-group"
    };
  }
  // 组织成员 userId 列表（供 core 数据隔离；orgId=0 用 JWT 当前组织）
  rpc GetUserIdsByOrg (GetUserIdsByOrgReq) returns (GetUserIdsByOrgRes) {
    option (google.api.http) = {
      get: "/v1/user/profile/ids-by-org"
    };
  }
  // 用户可收周报/训练报告的 staff 组织 id 列表（内部/agent）
  rpc GetStaffOrgIds (GetStaffOrgIdsReq) returns (GetStaffOrgIdsRes) {
    option (google.api.http) = {
      get: "/v1/user/profile/staff-org-ids"
    };
  }
  // 题面流水线资格用户（供 core 闸门；内部调用）
  // 默认=非公共域组织成员；可被个人 problem_fetch / problem_ai 覆盖
  rpc GetNonPublicOrgUserIds (GetNonPublicOrgUserIdsReq) returns (GetNonPublicOrgUserIdsRes) {
    option (google.api.http) = {
      get: "/v1/user/profile/non-public-org-user-ids"
    };
  }
  rpc GetByIds (GetByIdsReq) returns (GetByIdsRes) {
    option (google.api.http) = {
      post: "/v1/user/profile/get-by-ids",
      body: "*",
    };
  }
  // 定时任务策略：一人多组织时间隔取 MIN，开关为任一开启；每人一条（去重）
  rpc GetSyncPolicies (GetSyncPoliciesReq) returns (GetSyncPoliciesRes) {
    option (google.api.http) = {
      post: "/v1/user/profile/sync-policies",
      body: "*",
    };
  }
  // 管理员删除用户（硬删除）
  rpc Delete (DeleteReq) returns (DeleteRes) {
    option (google.api.http) = {
      post: "/v1/user/profile/delete",
      body: "*",
    };
  }
  // 精确用户名查资料（公开；受公共域隐私约束）
  rpc GetByUsername (GetByUsernameReq) returns (GetByIdRes) {
    option (google.api.http) = {
      get: "/v1/user/profile/get-by-username"
    };
  }
  // 某人关注的 userId 列表（供 core 动态/题库过滤；本人或公开）
  rpc GetFollowingIds (GetFollowingIdsReq) returns (GetFollowingIdsRes) {
    option (google.api.http) = {
      get: "/v1/user/profile/following-ids"
    };
  }
  // 在给定 ids 中保留「公共域动态可见」的用户（未配置隐私默认可见）
  rpc FilterPublicFeedUserIds (FilterPublicFeedUserIdsReq) returns (FilterPublicFeedUserIdsRes) {
    option (google.api.http) = {
      post: "/v1/user/profile/filter-public-feed-user-ids",
      body: "*",
    };
  }
  // 服务间：按 userId 取联系邮箱（不做隐私剥离，不拉 spider；无 HTTP）
  rpc GetContactEmail (GetContactEmailReq) returns (GetContactEmailRes);
}

message GetByIdReq {
  int64 userId = 1;
}

message GetByIdRes {
  uint64 userId = 1;
  string username = 2;
  string name = 3;
  string email = 4;
  int64 groupId = 5;
  string avatar = 6;
  bool emailEnabled = 8;
  int32 roleId = 9;
  bool emailWeeklyEnabled = 10;
  // 组织是否授权日报/周报（前端控制开关可开性）
  bool emailAllowedByOrg = 11;
  bool emailWeeklyAllowedByOrg = 12;
  message Spiders {
    string platform = 1;
    string username = 2;
    // 平台当前 rating（整数）；hasRating=false 时忽略
    int32 rating = 3;
    bool hasRating = 4;
  }
  repeated Spiders spiders = 7;
  // 最近一次 OJ 数据同步成功时间（unix 秒；0=尚无记录）
  int64 lastSyncAt = 13;
}

message GetByNameReq {
  string name = 1;
}

message GetByNameRes {
  message UserList {
    int64 userId = 1;
    string name = 2;
    string username = 3;
  }
  repeated UserList list = 1;
}

message GetListReq {
  int64 pageSize = 1;
  int64 pageNum = 2;
  // scope: org=当前组织成员；site=全站（仅站点管理员）；空=兼容旧逻辑（站管全站/否则组织）
  string scope = 3;
  // 模糊搜索：用户名 / 昵称（公共域 org_display_name ≡ users.name）；org 范围另含当前组织内名称
  string keyword = 4;
  // true=仅不活跃（已暂停同步）用户；与 dormant 判定一致（阈值 + 豁免）
  bool dormantOnly = 5;
}

message GetListRes {
  message OrgBrief {
    uint64 orgId = 1;
    string name = 2;
    string role = 3; // member|coach|captain|org_admin
  }
  message List {
    uint64 userId = 1;
    string username = 2;
    string name = 3;
    int64 groupId = 5;
    string avatar = 6;
    string lastSubmit = 7;
    int32 roleId = 8;
    bool isSiteAdmin = 9;
    repeated OrgBrief orgs = 10;
    string groupName = 11; // 分组显示名；无效 groupId 时为空或「默认分组」
    // 日报/周报接收偏好与组织授权（管理端展示/开关用）
    bool emailEnabled = 12;
    bool emailWeeklyEnabled = 13;
    bool emailAllowedByOrg = 14;
    bool emailWeeklyAllowedByOrg = 15;
    // 题面流水线有效状态（已应用个人覆盖；null 覆盖时按是否非公共域组织）
    bool problemFetchEnabled = 16;
    bool problemAiEnabled = 17;
    // 注册时间（unix 秒）
    int64 createdAt = 18;
    // 有效爬取 / AI 总结间隔（分钟；已应用站管个人覆盖，否则组织 MIN）
    int32 spiderIntervalMin = 19;
    int32 aiSummaryIntervalMin = 20;
    // 是否存在站点管理员个人覆盖（true=不走组织 MIN）
    bool spiderIntervalOverridden = 21;
    bool aiSummaryIntervalOverridden = 22;
    // 永不休眠（站管）
    bool syncExempt = 23;
    // 最近活跃 unix 秒；0=未知
    int64 lastLoginAt = 24;
    // 当前是否处于休眠（后台定时任务已停）
    bool dormant = 25;
  }
  repeated List list = 1;
  int64 total = 2;
}


message UpdateReq {
  uint64 userId = 1;
  // 已废弃：昵称请在「我的组织」改组织内称呼（公共域同步全局昵称）；本字段忽略
  string name = 3;
  string email = 4;
  string avatar = 6;
  // 修改/绑定邮箱时必填：发往新邮箱的验证码（purpose=change_email）
  string emailCode = 7;
}

message UpdateRes {
  int64 code = 1;
  string message = 2;
}

message MoveGroupReq {
  uint64 userId = 1;
  int64 groupId = 2;
}

message MoveGroupRes {
  int64 code = 1;
  string message = 2;
}

message SetEmailEnabledReq {
  int64 userId = 1;
  bool enabled = 2;
  // kind: daily(默认) | weekly
  string kind = 3;
}

message SetEmailEnabledRes {
  int64 code = 1;
  string message = 2;
}

message SetProblemPipelineReq {
  int64 userId = 1;
  bool enabled = 2;
  // kind: fetch（题面爬取）| ai（题面 AI 分析）
  string kind = 3;
}

message SetProblemPipelineRes {
  int64 code = 1;
  string message = 2;
}

// SetSyncIntervalsReq 站点管理员设置个人定时间隔覆盖
// spiderIntervalMin / aiSummaryIntervalMin：
//   省略（setSpider/setAi=false）= 不改该项
//   0 = 清除覆盖，回落组织 MIN
//   >0 = 强制该分钟数（优先级最高）
message SetSyncIntervalsReq {
  int64 userId = 1;
  int32 spiderIntervalMin = 2;
  int32 aiSummaryIntervalMin = 3;
  bool setSpider = 4;
  bool setAi = 5;
}

message SetSyncIntervalsRes {
  int64 code = 1;
  string message = 2;
}

message SetSyncExemptReq {
  int64 userId = 1;
  bool exempt = 2;
}

message SetSyncExemptRes {
  int64 code = 1;
  string message = 2;
}

// ClearDormantReq 批量把最近活跃刷新为当前时间，一次性解除休眠（非永久豁免）
message ClearDormantReq {
  repeated int64 userIds = 1;
}

message ClearDormantRes {
  int64 code = 1;
  string message = 2;
  // 实际更新的用户数
  int32 updated = 3;
}

message GetUserIdsByGroupReq {
  int64 groupId = 1;
}

message GetUserIdsByGroupRes {
  repeated int64 userIds = 1;
}

message GetUserIdsByOrgReq {
  int64 orgId = 1; // 0 = 调用方 JWT 当前组织
}

message GetUserIdsByOrgRes {
  repeated int64 userIds = 1;
  int64 orgId = 2;
}

message GetStaffOrgIdsReq {
  int64 userId = 1;
}

message GetStaffOrgIdsRes {
  repeated int64 orgIds = 1;
}

message GetNonPublicOrgUserIdsReq {}

message GetNonPublicOrgUserIdsRes {
  // 兼容旧调用：与 fetchUserIds 相同（题面爬取资格）
  repeated int64 userIds = 1;
  // 近窗提交可触发题面爬取的用户
  repeated int64 fetchUserIds = 2;
  // 近窗提交可触发题面 AI 的用户
  repeated int64 aiUserIds = 3;
}

message GetByIdsReq {
  repeated int64 userIds = 1;
  // 组织内展示名：>0 用该组织 org_display_name；0 则优先 JWT 当前 orgId；仍无则公共域
  int64 orgId = 2;
}

message GetByIdsRes {
  message UserProfile {
    int64 userId = 1;
    string name = 2;
    string avatar = 3;
    string username = 4;
  }
  repeated UserProfile profiles = 1;
}

message DeleteReq {
  int64 userId = 1;
}

message DeleteRes {
  int64 code = 1;
  string message = 2;
}

// 爬虫/AI 定时策略（core_data cron 用）
message GetSyncPoliciesReq {
  repeated int64 userIds = 1; // 空 = 返回全站有 membership 的用户策略（慎用；一般传 bound 用户）
}

message UserSyncPolicy {
  int64 userId = 1;
  bool enableSpider = 2;
  bool enableAiSummary = 3;
  bool enableAiEmail = 4;          // 组织授权日报
  int32 spiderIntervalMin = 5;
  int32 aiSummaryIntervalMin = 6;
  bool enableAiWeeklyEmail = 7;    // 组织授权周报且本人 staff
  bool isOrgStaff = 8;
  bool emailEnabled = 9;           // 个人日报偏好
  bool emailWeeklyEnabled = 10;    // 个人周报偏好
  // 是否允许后台定时任务（非休眠或已豁免）
  bool syncActive = 11;
}

message GetSyncPoliciesRes {
  repeated UserSyncPolicy policies = 1;
}

message GetByUsernameReq {
  string username = 1;
}

message GetFollowingIdsReq {
  int64 userId = 1; // 0 = 当前登录用户
}

message GetFollowingIdsRes {
  repeated int64 userIds = 1;
}

message FilterPublicFeedUserIdsReq {
  repeated int64 userIds = 1;
}

message FilterPublicFeedUserIdsRes {
  repeated int64 userIds = 1;
}

// 服务间查联系邮箱
message GetContactEmailReq {
  int64 userId = 1;
}

message GetContactEmailRes {
  string email = 1;
}