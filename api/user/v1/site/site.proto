syntax = "proto3";

package api.user.v1.site;
import "google/api/annotations.proto";
option go_package = "cwxu-algo/api/user/v1/site;site";
option java_multiple_files = true;
option java_package = "api.user.v1.site";

service Site {
  // 公开：站点品牌配置
  rpc GetConfig (GetConfigReq) returns (GetConfigRes) {
    option (google.api.http) = {
      get: "/v1/user/site/config"
    };
  }
  // 管理员：获取完整站点配置（密钥脱敏）
  rpc GetAdminConfig (GetAdminConfigReq) returns (GetAdminConfigRes) {
    option (google.api.http) = {
      get: "/v1/user/site/admin-config"
    };
  }
  // 管理员：更新站点配置（品牌 / SMTP / AI）
  rpc UpdateConfig (UpdateConfigReq) returns (UpdateConfigRes) {
    option (google.api.http) = {
      post: "/v1/user/site/config"
      body: "*"
    };
  }
  // 管理员：发送测试邮件
  rpc TestEmail (TestEmailReq) returns (TestEmailRes) {
    option (google.api.http) = {
      post: "/v1/user/site/test-email"
      body: "*"
    };
  }
  // 访问上报（公开；可选 JWT 计入日活）
  rpc VisitPing (VisitPingReq) returns (VisitPingRes) {
    option (google.api.http) = {
      post: "/v1/user/site/visit-ping"
      body: "*"
    };
  }
  // 站点访问概览（仅站点管理员）
  rpc GetAccessStats (GetAccessStatsReq) returns (GetAccessStatsRes) {
    option (google.api.http) = {
      get: "/v1/user/site/access-stats"
    };
  }
}

message GetConfigReq {}

message GetConfigRes {
  int64 code = 1;
  string message = 2;
  string site_title = 3;
  string site_logo = 4;
  string favicon = 5;
  string footer_icp = 6;
}

message GetAdminConfigReq {}

message GetAdminConfigRes {
  int64 code = 1;
  string message = 2;
  string site_title = 3;
  string site_logo = 4;
  string favicon = 5;
  // SMTP
  string smtp_host = 6;
  int32 smtp_port = 7;
  string smtp_username = 8;
  // 脱敏：已配置为 ****，未配置为空
  string smtp_password_masked = 9;
  bool smtp_password_set = 10;
  string smtp_from = 11;
  // Agent（AI 总结 / 日报周报）
  string agent_model = 12;
  string agent_secret_masked = 13;
  bool agent_secret_set = 14;
  // 题库 AI 分析
  string ai_analyze_endpoint = 15;
  string ai_analyze_model = 16;
  string ai_analyze_secret_masked = 17;
  bool ai_analyze_secret_set = 18;
  // 页脚
  string footer_icp = 19;
  // 不活跃天数阈值（默认 14）
  int32 inactive_days = 20;
}

message UpdateConfigReq {
  string site_title = 1;
  string site_logo = 2;
  string favicon = 3;
  // SMTP（password 空串表示不修改）
  string smtp_host = 4;
  int32 smtp_port = 5;
  string smtp_username = 6;
  string smtp_password = 7;
  string smtp_from = 8;
  bool clear_smtp_password = 9;
  // Agent
  string agent_model = 10;
  string agent_secret = 11;
  bool clear_agent_secret = 12;
  // 题库 AI
  string ai_analyze_endpoint = 13;
  string ai_analyze_model = 14;
  string ai_analyze_secret = 15;
  bool clear_ai_analyze_secret = 16;
  // 页脚备案号
  string footer_icp = 17;
  // 不活跃天数；0 或不传 = 不修改；>0 时夹取 1–365
  int32 inactive_days = 18;
  // 是否写入 inactive_days（与间隔覆盖同一套语义）
  bool set_inactive_days = 19;
}

message UpdateConfigRes {
  int64 code = 1;
  string message = 2;
  string site_title = 3;
  string site_logo = 4;
  string favicon = 5;
  string footer_icp = 6;
}

// 测试邮件：可用已保存配置，也可临时覆盖（password 空则用已保存）
message TestEmailReq {
  string to = 1;
  string smtp_host = 2;
  int32 smtp_port = 3;
  string smtp_username = 4;
  string smtp_password = 5;
  string smtp_from = 6;
}

message TestEmailRes {
  int64 code = 1;
  string message = 2;
  bool success = 3;
}

message VisitPingReq {
  // 前端路由 path，如 /home；空则记为 /
  string path = 1;
  // 匿名访客 id（localStorage uuid）；登录用户可不传
  string visitor_id = 2;
}

message VisitPingRes {
  int64 code = 1;
  string message = 2;
  // 是否计入本次人次（节流内重复访问为 false）
  bool counted = 3;
}

message GetAccessStatsReq {
  // 历史天数，默认 30，最大 90
  int32 days = 1;
  // 今日独立 IP 列表上限，默认 200，最大 500
  int32 ip_limit = 2;
  // 热门页面条数，默认 20，最大 50
  int32 path_limit = 3;
}

message AccessDayStat {
  // yyyy-MM-dd
  string date = 1;
  // 页面浏览量 PV（精确计数）
  int64 pv = 2;
  // 登录日活 DAU（精确去重 userId）
  int64 dau = 3;
  // 独立访客 UV（visitorId / IP 去重）
  int64 uv = 4;
  // 独立 IP 数（精确集合基数）
  int64 unique_ip = 5;
  // 当日新注册用户数
  int64 new_users = 6;
}

message AccessPathStat {
  string path = 1;
  // 页面/服务分类：首页、题库、比赛、公告、后台、工具等
  string category = 2;
  int64 pv = 3;
  // 占今日 PV 百分比 0-100
  double share = 4;
}

message AccessCategoryStat {
  string category = 1;
  int64 pv = 2;
  double share = 3;
}

message AccessIpItem {
  string ip = 1;
  // 该 IP 今日 PV
  int64 pv = 2;
  // 最近一次访问路径
  string last_path = 3;
  // unix 秒
  int64 last_seen = 4;
}

message GetAccessStatsRes {
  int64 code = 1;
  string message = 2;
  AccessDayStat today = 3;
  AccessDayStat yesterday = 4;
  repeated AccessDayStat series = 5;
  // 是否成功解析到客户端 IP（部署侧反代头是否可用）
  bool client_ip_available = 6;
  // 近 N 日合计
  int64 total_pv = 7;
  int64 total_dau_sum = 8;
  // 今日热门页面
  repeated AccessPathStat top_paths = 9;
  // 今日服务/模块使用分布
  repeated AccessCategoryStat categories = 10;
  // 今日独立 IP 明细（按 PV 降序）
  repeated AccessIpItem ips = 11;
  // 指标说明（审核/运营可读）
  string metric_note = 12;

  // —— 用户量 ——
  int64 registered_users = 13;
  // 月活跃用户（当月登录用户访问去重）
  int64 mau = 14;

  // —— 技术指标（Redis 日桶，自建精确计数）——
  // 今日 API 请求总量（user/core/agent 合计）
  int64 api_requests_today = 15;
  // 今日 API 并发峰值
  int64 api_peak_concurrent = 16;
  // 当前进行中请求数
  int64 api_inflight = 17;
  // 爬虫：今日入队 / 成功 / 失败
  int64 spider_enqueued_today = 18;
  int64 spider_ok_today = 19;
  int64 spider_fail_today = 20;
  // 爬虫今日新写入提交记录条数（抓取数据量）
  int64 spider_rows_today = 21;
}
