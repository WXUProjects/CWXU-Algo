syntax = "proto3";

package api.user.v1.site;
import "google/api/annotations.proto";
option go_package = "cwxu-algo/api/user/v1/site;site";
option java_multiple_files = true;
option java_package = "api.user.v1.site";

service Site {
  // 公开：站点品牌配置
  rpc GetConfig (GetConfigReq) returns (GetConfigRes) {
    option (google.api.http) = {
      get: "/v1/user/site/config"
    };
  }
  // 管理员：获取完整站点配置（密钥脱敏）
  rpc GetAdminConfig (GetAdminConfigReq) returns (GetAdminConfigRes) {
    option (google.api.http) = {
      get: "/v1/user/site/admin-config"
    };
  }
  // 管理员：更新站点配置（品牌 / SMTP / AI）
  rpc UpdateConfig (UpdateConfigReq) returns (UpdateConfigRes) {
    option (google.api.http) = {
      post: "/v1/user/site/config"
      body: "*"
    };
  }
  // 管理员：发送测试邮件
  rpc TestEmail (TestEmailReq) returns (TestEmailRes) {
    option (google.api.http) = {
      post: "/v1/user/site/test-email"
      body: "*"
    };
  }
  // 访问上报（公开；可选 JWT 计入日活）
  rpc VisitPing (VisitPingReq) returns (VisitPingRes) {
    option (google.api.http) = {
      post: "/v1/user/site/visit-ping"
      body: "*"
    };
  }
  // 站点访问概览（仅站点管理员）
  rpc GetAccessStats (GetAccessStatsReq) returns (GetAccessStatsRes) {
    option (google.api.http) = {
      get: "/v1/user/site/access-stats"
    };
  }
}

message GetConfigReq {}

message GetConfigRes {
  int64 code = 1;
  string message = 2;
  string site_title = 3;
  string site_logo = 4;
  string favicon = 5;
  string footer_icp = 6;
}

message GetAdminConfigReq {}

message GetAdminConfigRes {
  int64 code = 1;
  string message = 2;
  string site_title = 3;
  string site_logo = 4;
  string favicon = 5;
  // SMTP
  string smtp_host = 6;
  int32 smtp_port = 7;
  string smtp_username = 8;
  // 脱敏：已配置为 ****，未配置为空
  string smtp_password_masked = 9;
  bool smtp_password_set = 10;
  string smtp_from = 11;
  // Agent（AI 总结 / 日报周报）
  string agent_model = 12;
  string agent_secret_masked = 13;
  bool agent_secret_set = 14;
  // 题库 AI 分析
  string ai_analyze_endpoint = 15;
  string ai_analyze_model = 16;
  string ai_analyze_secret_masked = 17;
  bool ai_analyze_secret_set = 18;
  // 页脚
  string footer_icp = 19;
}

message UpdateConfigReq {
  string site_title = 1;
  string site_logo = 2;
  string favicon = 3;
  // SMTP（password 空串表示不修改）
  string smtp_host = 4;
  int32 smtp_port = 5;
  string smtp_username = 6;
  string smtp_password = 7;
  string smtp_from = 8;
  bool clear_smtp_password = 9;
  // Agent
  string agent_model = 10;
  string agent_secret = 11;
  bool clear_agent_secret = 12;
  // 题库 AI
  string ai_analyze_endpoint = 13;
  string ai_analyze_model = 14;
  string ai_analyze_secret = 15;
  bool clear_ai_analyze_secret = 16;
  // 页脚备案号
  string footer_icp = 17;
}

message UpdateConfigRes {
  int64 code = 1;
  string message = 2;
  string site_title = 3;
  string site_logo = 4;
  string favicon = 5;
  string footer_icp = 6;
}

// 测试邮件：可用已保存配置，也可临时覆盖（password 空则用已保存）
message TestEmailReq {
  string to = 1;
  string smtp_host = 2;
  int32 smtp_port = 3;
  string smtp_username = 4;
  string smtp_password = 5;
  string smtp_from = 6;
}

message TestEmailRes {
  int64 code = 1;
  string message = 2;
  bool success = 3;
}

message VisitPingReq {
  // 前端路由 path，如 /home；空则记为 /
  string path = 1;
  // 匿名访客 id（localStorage uuid）；登录用户可不传
  string visitor_id = 2;
}

message VisitPingRes {
  int64 code = 1;
  string message = 2;
  // 是否计入本次人次（节流内重复访问为 false）
  bool counted = 3;
}

message GetAccessStatsReq {
  // 历史天数，默认 30，最大 90
  int32 days = 1;
}

message AccessDayStat {
  // yyyy-MM-dd
  string date = 1;
  int64 pv = 2;
  int64 dau = 3;
  int64 uv = 4;
}

message GetAccessStatsRes {
  int64 code = 1;
  string message = 2;
  AccessDayStat today = 3;
  AccessDayStat yesterday = 4;
  repeated AccessDayStat series = 5;
  // 是否成功解析到客户端 IP（部署侧反代头是否可用）
  bool client_ip_available = 6;
}
