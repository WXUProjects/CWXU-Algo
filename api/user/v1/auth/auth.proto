syntax = "proto3";

package api.user.v1;
import "google/api/annotations.proto";
option go_package = "cwxu-algo/api/user/v1/auth;auth";
option java_multiple_files = true;
option java_package = "api.user.v1";
// Auth 认证服务
service Auth {
  rpc Login (LoginReq) returns (LoginRes) {
    option (google.api.http) = {
      post: "/v1/user/auth/login",
      body: "*"
    };
  }
  rpc Register (RegisterReq) returns (RegisterRes) {
    option (google.api.http) = {
      post: "/v1/user/auth/register",
      body:"*"
    };
  }
  // 根据当前登录态重签 JWT（任命角色后刷新页面即可同步权限）
  rpc Refresh (RefreshReq) returns (LoginRes) {
    option (google.api.http) = {
      post: "/v1/user/auth/refresh",
      body: "*"
    };
  }
  // 发送邮箱验证码（注册 / 找回密码）
  rpc SendCode (SendCodeReq) returns (SendCodeRes) {
    option (google.api.http) = {
      post: "/v1/user/auth/send-code",
      body: "*"
    };
  }
  // 邮箱验证码重置密码
  rpc ResetPassword (ResetPasswordReq) returns (ResetPasswordRes) {
    option (google.api.http) = {
      post: "/v1/user/auth/reset-password",
      body: "*"
    };
  }
  // 登录态修改密码（旧密码校验）
  rpc ChangePassword (ChangePasswordReq) returns (ChangePasswordRes) {
    option (google.api.http) = {
      post: "/v1/user/auth/change-password",
      body: "*"
    };
  }
}

message LoginReq {
  // 用户名或邮箱
  string username = 1;
  string password = 2;
}

message LoginRes {
  bool success = 1;
  string message = 3;
  string jwtToken = 2;
}

message RegisterReq {
  string username = 1;
  string password = 2;
  string name = 3;
  string email = 4;
  int64 groupId = 5;
  // 邮箱验证码
  string code = 6;
}
message RegisterRes {
  bool success = 1;
  string message = 2;
}

message RefreshReq {}

// purpose: register | reset
message SendCodeReq {
  string email = 1;
  string purpose = 2;
}

message SendCodeRes {
  bool success = 1;
  string message = 2;
}

message ResetPasswordReq {
  string email = 1;
  string code = 2;
  // 新密码（客户端 SHA256 后传输）
  string password = 3;
}

message ResetPasswordRes {
  bool success = 1;
  string message = 2;
}

// 客户端 SHA256 后传输
message ChangePasswordReq {
  string oldPassword = 1;
  string newPassword = 2;
}

message ChangePasswordRes {
  bool success = 1;
  string message = 2;
}
